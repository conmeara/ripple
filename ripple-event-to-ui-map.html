<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ripple · Motion feed designer</title>
<style>
:root {
  --bg: #0a0a0b;
  --panel: #121214;
  --panel-2: #161618;
  --surface: #1c1c1f;
  --surface-2: #232327;
  --border: rgba(255,255,255,0.08);
  --border-strong: rgba(255,255,255,0.15);
  --text: #ececed;
  --muted: #9a9a9f;
  --faint: #66666c;
  --mono: "SFMono-Regular", "Cascadia Code", ui-monospace, Consolas, monospace;
  --sans: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
  --c-thinking: #b69cff;
  --c-explore: #6fb4f1;
  --c-visual: #4fd0d6;
  --c-change: #e0b061;
  --c-verify: #67c98b;
  --c-approval: #e07d6a;
}
*,*::before,*::after { box-sizing: border-box; }
body { margin:0; min-height:100vh; overflow:hidden; background:var(--bg); color:var(--text); font-family:var(--sans); font-size:13px; line-height:1.45; }
button, textarea, input { font: inherit; color: inherit; }

.app { display:grid; grid-template-columns:300px minmax(0,1fr); height:100vh; }

/* Sidebar */
.side { border-right:1px solid var(--border); background:var(--panel); display:flex; flex-direction:column; min-width:0; }
.side-head { padding:14px 16px 12px; border-bottom:1px solid var(--border); }
.side-head strong { display:block; font-size:13.5px; font-weight:650; }
.side-head span { display:block; color:var(--muted); font-size:11px; margin-top:2px; }
.side-scroll { min-height:0; flex:1; overflow:auto; padding:14px; }
.section { margin-bottom:20px; }
.section-title { margin-bottom:9px; color:var(--muted); font-size:10.5px; font-weight:700; letter-spacing:.09em; text-transform:uppercase; }

.preset-grid { display:grid; gap:7px; }
.chip { min-height:34px; padding:8px 10px; border:1px solid var(--border); border-radius:8px; background:var(--surface); color:var(--muted); cursor:pointer; font-size:12px; text-align:left; transition:border-color .15s, background .15s, color .15s; }
.chip:hover { border-color:var(--border-strong); color:var(--text); }
.chip.active { border-color:rgba(157,188,232,0.5); background:#1b212a; color:var(--text); }
.chip small { display:block; color:var(--faint); font-size:10.5px; margin-top:2px; }
.chip.active small { color:var(--muted); }

.seg { display:grid; grid-auto-flow:column; gap:3px; padding:3px; border:1px solid var(--border); border-radius:9px; background:var(--surface); }
.seg button { border:0; border-radius:6px; background:transparent; color:var(--muted); cursor:pointer; padding:7px 8px; font-size:12px; }
.seg button.active { background:var(--surface-2); color:var(--text); }

.control { display:flex; gap:10px; align-items:flex-start; padding:8px 0; border-bottom:1px solid rgba(255,255,255,0.045); }
.control:last-child { border-bottom:0; }
.toggle { width:32px; height:18px; margin-top:1px; flex:0 0 auto; border:1px solid rgba(255,255,255,0.14); border-radius:999px; background:#232327; cursor:pointer; position:relative; }
.toggle::after { content:""; position:absolute; width:14px; height:14px; left:1px; top:1px; border-radius:999px; background:#86868c; transition:transform .14s, background .14s; }
.toggle.on { background:rgba(103,201,139,0.24); border-color:rgba(103,201,139,0.4); }
.toggle.on::after { transform:translateX(14px); background:#7ee0a6; }
.control-text strong { display:block; font-size:12px; font-weight:600; }
.control-text span { display:block; color:var(--faint); font-size:11px; line-height:1.35; }

/* Main */
.main { min-width:0; display:flex; flex-direction:column; }
.topbar { height:50px; display:flex; align-items:center; gap:14px; padding:0 18px; border-bottom:1px solid var(--border); background:var(--panel-2); }
.mark { width:24px; height:24px; display:grid; place-items:center; border-radius:7px; background:#222a36; color:#d8e9ff; font-family:var(--mono); font-weight:700; font-size:12px; }
.topbar .ttl strong { display:block; font-size:13px; font-weight:650; }
.topbar .ttl span { display:block; font-size:11px; color:var(--muted); }
.topbar .conv { margin-left:auto; font-size:11px; color:var(--faint); display:flex; align-items:center; gap:7px; }
.topbar .conv b { color:var(--muted); font-weight:500; }

.canvas { min-height:0; flex:1; overflow:auto; padding:26px 20px; display:flex; justify-content:center; }
.thread { width:100%; max-width:600px; }

.umsg { display:flex; justify-content:flex-end; margin:6px 2px 18px; }
.umsg .bubble { max-width:80%; padding:9px 13px; border-radius:13px; background:var(--surface-2); font-size:13px; }

.assistant { display:flex; flex-direction:column; gap:1px; position:relative; }

.mrow { display:flex; align-items:center; gap:8px; padding:4px 8px; border-radius:7px; color:var(--muted); font-size:13px; position:relative; }
.mrow:hover { background:rgba(255,255,255,0.035); }
.mrow > svg { width:15px; height:15px; flex:0 0 auto; color:var(--muted); }
.mrow .t { min-width:0; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; font-weight:500; }
.mrow .s { color:var(--faint); min-width:0; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
.mrow .chev { margin-left:2px; width:13px; height:13px; color:var(--faint); opacity:0; transition:opacity .15s, transform .15s; flex:0 0 auto; }
.mrow.coll { cursor:pointer; }
.mrow.coll:hover .chev, .mrow.coll.open .chev { opacity:1; }
.mrow.coll.open .chev { transform:rotate(90deg); }
.mrow.thinking .t, .mrow.thinking > svg { color:var(--c-thinking); }
.mrow.err .t, .mrow.err > svg { color:var(--c-approval); }

.shimmer { background:linear-gradient(90deg, var(--muted), #f4f4f5, var(--muted)); background-size:220% 100%; -webkit-background-clip:text; background-clip:text; color:transparent; animation:sh 1.2s linear infinite; }
@keyframes sh { from{background-position:200% 0;} to{background-position:-20% 0;} }

.from { font-size:10.5px; color:var(--faint); padding:0 8px 3px 31px; font-family:var(--mono); }
.from b { color:#8a8a90; font-weight:500; }

.mdetails { padding:3px 8px 8px 31px; display:grid; gap:3px; }
.mdetails .d { font-size:12px; color:var(--faint); }
.mdetails .d b { color:var(--muted); font-weight:500; }
.mdetails.think { color:#c2c2c8; font-size:12.5px; line-height:1.55; white-space:pre-wrap; }

.mvisual { margin:6px 8px 9px 8px; border:1px solid var(--border); border-radius:11px; overflow:hidden; width:min(80%,27rem); }
.mvisual .frame { aspect-ratio:16/9; display:grid; place-items:center; background:radial-gradient(circle at 55% 32%, rgba(151,95,255,0.5), transparent 34%), linear-gradient(135deg,#8b43ff,#3c1678); }
.mvisual.sheet .frame { background:linear-gradient(135deg,#1d2330,#0e1118); }
.mvisual .phone { width:50px; height:96px; border:4px solid #0c0c0c; border-radius:14px; background:linear-gradient(#1c1c1c,#080808); box-shadow:0 10px 26px rgba(0,0,0,.5); position:relative; }
.mvisual .phone::after { content:"2/3"; position:absolute; inset:0; display:grid; place-items:center; color:#d9f56c; font-size:12px; font-weight:700; }
.mvisual .strip { display:flex; gap:6px; }
.mvisual .strip i { width:34px; height:58px; border-radius:6px; background:linear-gradient(#2a2f3d,#11151d); border:1px solid rgba(255,255,255,.07); }
.mvisual .cap { padding:6px 10px; border-top:1px solid var(--border); color:var(--faint); font-size:10.5px; }

.tool-card { margin:5px 8px; border:1px solid var(--border); border-radius:9px; background:#0f0f12; overflow:hidden; }
.tool-card .h { padding:8px 11px; font-size:11.5px; color:var(--muted); }
.tool-card pre { margin:0; padding:8px 11px 10px; border-top:1px solid var(--border); font-family:var(--mono); font-size:11px; color:#a4a4aa; white-space:pre-wrap; line-height:1.5; }

.approval-card { margin:8px 8px 12px; border:1px solid rgba(224,125,106,0.35); border-radius:12px; background:rgba(224,125,106,0.06); overflow:hidden; }
.approval-card .ah { padding:11px 13px; display:flex; align-items:center; gap:9px; font-size:13px; font-weight:550; }
.approval-card .ah svg { width:16px; height:16px; color:var(--c-approval); flex:0 0 auto; }
.approval-card .lines { padding:0 13px 9px 38px; display:grid; gap:3px; }
.approval-card .lines .l { font-size:12px; color:var(--muted); }
.approval-card .lines .l b { color:var(--faint); font-weight:500; min-width:68px; display:inline-block; }
.approval-card .acts { display:flex; gap:8px; padding:10px 13px; border-top:1px solid rgba(224,125,106,0.2); }
.approval-card .acts button { flex:1; border:1px solid var(--border); border-radius:8px; background:var(--surface); padding:8px; cursor:pointer; font-size:12.5px; }
.approval-card .acts .ok { background:rgba(103,201,139,0.16); border-color:rgba(103,201,139,0.34); color:#bdf0d2; }

.reply { padding:10px 8px 4px; font-size:13.5px; line-height:1.62; color:#dcdce0; }
.usage-line { padding:6px 8px 0; color:rgba(154,154,159,0.55); font-size:11px; }

.menu-btn { position:absolute; top:-2px; right:0; opacity:0; border:0; background:transparent; color:var(--faint); cursor:pointer; padding:3px 7px; border-radius:7px; font-size:16px; line-height:1; transition:opacity .15s; }
.assistant:hover .menu-btn { opacity:.75; }
.menu-btn:hover { background:var(--surface); color:var(--text); opacity:1; }

.errbox { margin:20px auto; max-width:560px; border:1px solid var(--c-approval); border-radius:10px; background:rgba(224,125,106,0.08); padding:14px; font-family:var(--mono); font-size:12px; color:#f0c4ba; white-space:pre-wrap; }

/* Prompt */
.promptbar { border-top:1px solid var(--border); background:var(--panel-2); padding:12px 18px; }
.promptbar .ph { display:flex; align-items:center; margin-bottom:8px; }
.promptbar .ph strong { font-size:11px; letter-spacing:.08em; text-transform:uppercase; color:var(--muted); }
.promptbar .ph .copy { margin-left:auto; border:1px solid var(--border); border-radius:8px; background:var(--surface); color:var(--text); cursor:pointer; padding:6px 14px; font-size:12px; }
.promptbar .ph .copy:hover { border-color:var(--border-strong); }
.promptbar pre { margin:0; max-height:150px; overflow:auto; font-family:var(--mono); font-size:11px; color:var(--muted); white-space:pre-wrap; line-height:1.55; }

::-webkit-scrollbar { width:8px; height:8px; }
::-webkit-scrollbar-thumb { background:rgba(255,255,255,0.13); border-radius:999px; }

@media (max-width:1080px){ .app { grid-template-columns:1fr; } .side { display:none; } }
</style>
</head>
<body>
<div class="app">
  <aside class="side">
    <div class="side-head">
      <strong>Motion feed designer</strong>
      <span>Decide how agent runtime activity renders for motion designers.</span>
    </div>
    <div class="side-scroll">
      <section class="section">
        <div class="section-title">Start from</div>
        <div class="preset-grid" id="presets"></div>
      </section>
      <section class="section">
        <div class="section-title">Provider</div>
        <div class="seg" id="providerSeg">
          <button data-provider="claude" class="active">Claude</button>
          <button data-provider="codex">Codex</button>
        </div>
      </section>
      <section class="section">
        <div class="section-title">Example run</div>
        <div class="preset-grid" id="scenarioList"></div>
      </section>
      <section class="section">
        <div class="section-title">UI decisions</div>
        <div id="controls"></div>
      </section>
    </div>
  </aside>

  <main class="main">
    <header class="topbar">
      <div class="mark">R</div>
      <div class="ttl">
        <strong id="topTitle">Motion-editor chat</strong>
        <span id="topSub"></span>
      </div>
      <div class="conv" id="conv"></div>
    </header>

    <div class="canvas">
      <div class="thread" id="thread"></div>
    </div>

    <div class="promptbar">
      <div class="ph">
        <strong>Direction for building this</strong>
        <button class="copy" id="copyBtn">Copy prompt</button>
      </div>
      <pre id="promptOut"></pre>
    </div>
  </main>
</div>

<script>
/* ---------- icons ---------- */
var ICON = {
  thinking:'<path d="M13 3l1.9 5.1L20 10l-5.1 1.9L13 17l-1.9-5.1L6 10l5.1-1.9z"/><path d="M5 15v3M3.5 16.5h3"/>',
  explore:'<circle cx="11" cy="11" r="7"/><path d="m21 21-4.3-4.3"/>',
  visual:'<path d="M2 12s3.6-7 10-7 10 7 10 7-3.6 7-10 7-10-7-10-7z"/><circle cx="12" cy="12" r="3"/>',
  change:'<path d="m3 21 11-11"/><path d="M14 4.5 15.5 6M18.5 2l.7 1.8L21 4.5l-1.8.7L18.5 7l-.7-1.8L16 4.5z"/>',
  verify:'<circle cx="12" cy="12" r="9"/><path d="m10 8 6 4-6 4z"/>',
  status:'<circle cx="12" cy="12" r="3.4"/><path d="M12 3v2M12 19v2M3 12h2M19 12h2"/>',
  approval:'<path d="M12 2 4 5v6c0 5 3.5 8 8 11 4.5-3 8-6 8-11V5z"/><path d="m9 12 2 2 4-4"/>',
  chev:'<path d="m9 6 6 6-6 6"/>'
};
function svg(n){ return '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round">'+(ICON[n]||ICON.status)+'</svg>'; }
var FAM = {
  thinking:{c:'var(--c-thinking)',icon:'thinking'},
  explore:{c:'var(--c-explore)',icon:'explore'},
  visual:{c:'var(--c-visual)',icon:'visual'},
  change:{c:'var(--c-change)',icon:'change'},
  verify:{c:'var(--c-verify)',icon:'verify'},
  status:{c:'var(--c-status)',icon:'status'}
};
function esc(v){ return String(v).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

/* ---------- scenarios ---------- */
function ev(family,sub,d){ d=d||{}; d.family=family; d.sub=sub; return d; }
var THOUGHT = "I should inspect the current frame before touching anything, then move the phone group up and verify the layout still balances against the headline.";
var SCENARIOS = {
  "edit-flow":{label:"Edit motion", hint:"think · read · edit · check · snapshot", user:"the phones sit too low — nudge them up", events:[
    ev("thinking","reason",{text:THOUGHT}),
    ev("explore","read",{file:"index.html"}),
    ev("change","edit",{file:"index.html",oldStr:"top: 295px;",newStr:"top: 215px;"}),
    ev("verify","diff",{cmd:"git diff -- index.html"}),
    ev("visual","snapshot",{}),
    ev("text","reply",{text:"I moved the phone mockups up so they sit centered in the frame, then re-checked the snapshot to confirm the composition reads cleanly."}),
    ev("usage","tokens",{in:1240,out:318,ms:4200,model:"claude-opus / gpt-5.5"})
  ]},
  "inspect":{label:"Inspect & answer", hint:"think · read ×2 · search · snapshot", user:"what's on the screen right now?", events:[
    ev("thinking","reason",{text:"Inspect the current frame and read the layout source so I can describe what's actually rendered, in plain motion language."}),
    ev("explore","read",{file:"index.html"}),
    ev("explore","read",{file:"styles.css"}),
    ev("explore","grep",{pattern:"fadeIn"}),
    ev("visual","snapshot",{}),
    ev("text","reply",{text:"The frame shows a centered phone mockup on a deep-purple gradient, with a fitness dashboard inside: a weekly-goal card, a progress ring, and weekday dots."}),
    ev("usage","tokens",{in:980,out:240,ms:3100,model:"claude-opus / gpt-5.5"})
  ]},
  "shell":{label:"Shell exploration", hint:"list · read · search · edit · lint", user:"find the intro timeline and tighten it", events:[
    ev("explore","glob",{pattern:"**/*.html"}),
    ev("explore","read",{file:"index.html"}),
    ev("explore","grep",{pattern:"timeline"}),
    ev("change","edit",{file:"index.html",oldStr:"duration: 1.2",newStr:"duration: 0.8"}),
    ev("verify","lint",{cmd:"hyperframes lint .",out:"No issues found"}),
    ev("text","reply",{text:"Found the intro timeline and shortened its duration from 1.2s to 0.8s, then linted clean."})
  ]},
  "sheet":{label:"Review over time", hint:"think · frame-sheet", user:"does the intro feel smooth across the first second?", events:[
    ev("thinking","reason",{text:"Pull a frame sheet across the intro window so I can judge the easing over time rather than a single frame."}),
    ev("visual","sheet",{range:"0s..1.5s"}),
    ev("text","reply",{text:"Across the first 1.5s the phones ease in smoothly, but frames 3–4 hold a beat too long — I'd tighten the middle of the curve."})
  ]},
  "approval":{label:"Approval gate", hint:"think · approval · reply", user:"export this as an mp4 for review", events:[
    ev("thinking","reason",{text:"Exporting writes a file and runs a heavier render, so it needs explicit permission before I run it."}),
    ev("approval","command",{cmd:"ripple export --mp4 out/review.mp4"}),
    ev("text","reply",{text:"Queued the export — approve the render above and I'll produce out/review.mp4."})
  ]},
  "failure":{label:"Failing check", hint:"edit · failing lint", user:"apply the fix and run the check", events:[
    ev("change","edit",{file:"index.html",oldStr:"left: 680px;",newStr:"left: 800px;"}),
    ev("verify","lint",{cmd:"hyperframes lint .",out:"error: keyframe 'pulse' references missing easing",exit:1})
  ]}
};

/* ---------- state ---------- */
function makeRules(o){ return Object.assign({
  friendly:true, coalesce:true, thinkingUmbrella:true, inlineVisuals:true, hideTechnical:true, showUsage:false, liveShimmer:true, showMapping:false
}, o||{}); }
var state = { provider:"claude", scenario:"edit-flow", isLive:false, rules:makeRules() };

var RULE_DEFS = [
  ["friendly","Plain-language activities","“Checked current frame”, “Changed motion” instead of Read / Edit / Bash."],
  ["coalesce","Group related steps","Fold consecutive reads/searches and consecutive edits into one umbrella row."],
  ["thinkingUmbrella","Thinking umbrella","One quiet row that previews the thought; click to expand the full reasoning."],
  ["inlineVisuals","Inline visual checks","Show snapshot / frame-sheet images right in the feed."],
  ["hideTechnical","Hide technical details","Tuck commands, diffs, paths & usage behind the “…” menu."],
  ["showUsage","Show token usage","Surface a faint token/cost footer."],
  ["liveShimmer","Shimmer live item","Animate the current activity while the run streams."],
  ["showMapping","Show what each row maps from","Annotate each row with the raw provider events it came from."]
];

var PRESETS = {
  "Motion designer":{ desc:"the target", provider:"claude", scenario:"edit-flow", isLive:false, rules:makeRules() },
  "1Code / developer":{ desc:"raw tool rows", provider:"claude", scenario:"edit-flow", isLive:false, rules:makeRules({friendly:false,coalesce:false,thinkingUmbrella:false,hideTechnical:false,showUsage:true}) },
  "Live run":{ desc:"mid-stream", provider:"claude", scenario:"edit-flow", isLive:true, rules:makeRules() }
};

/* ---------- raw source labels (the mapping, inline) ---------- */
function rawSource(e, provider){
  var s=e.sub;
  if(provider==="claude"){
    if(e.family==="thinking") return "thinking block";
    if(e.family==="explore") return s==="read"?("Read "+e.file):s==="grep"?("Grep "+e.pattern):("Glob "+e.pattern);
    if(e.family==="visual") return s==="sheet"?"mcp ripple_frame_sheet":"mcp ripple_snapshot";
    if(e.family==="change") return (s==="write"?"Write ":"Edit ")+e.file;
    if(e.family==="verify") return "Bash "+e.cmd;
  } else {
    if(e.family==="thinking") return "item/reasoning/delta";
    if(e.family==="explore") return "commandExecution "+(s==="read"?"sed":s==="grep"?"rg":"ls");
    if(e.family==="visual") return "commandExecution "+(s==="sheet"?"ripple frame-sheet":"ripple snapshot");
    if(e.family==="change") return "fileChange "+e.file;
    if(e.family==="verify") return "commandExecution "+(e.cmd||"").split(" ")[0];
  }
  return e.family;
}

/* ---------- build motion items ---------- */
function plural(n,one,many){ return n+" "+(n===1?one:(many||one+"s")); }
function stripMd(t){ return (String(t).split("\n").map(function(x){return x.trim();}).find(Boolean)||"").replace(/\*\*(.*?)\*\*/g,"$1").replace(/`([^`]+)`/g,"$1").replace(/\s+/g," ").trim(); }
function diffStat(e){ if(!e.oldStr&&!e.newStr) return ""; var o=(e.oldStr||"").split("\n"),n=(e.newStr||"").split("\n"),m=Math.max(o.length,n.length),c=0; for(var i=0;i<m;i++) if(o[i]!==n[i]) c++; return c>0?("+"+c+" -"+c):""; }

function exploreTitle(grp,status,friendly){
  if(!friendly) return grp.map(function(e){return e.sub==="read"?("Read "+e.file):e.sub==="grep"?("Searched "+e.pattern):"Listed files";}).join("  ·  ");
  var f=0,l=0,s=0;
  grp.forEach(function(e){ if(e.sub==="read")f++; else if(e.sub==="grep")s++; else if(e.sub==="glob")l++; });
  var p=[]; if(f)p.push(plural(f,"file")); if(l)p.push(plural(l,"list")); if(s)p.push(plural(s,"search","searches"));
  return (status==="pending"?"Exploring":"Explored")+(p.length?" "+p.join(", "):"");
}
function editTitle(grp,status,friendly){
  if(!friendly) return grp.map(function(e){return (e.sub==="write"?"Write ":"Edit ")+e.file;}).join("  ·  ");
  var w=grp.filter(function(e){return e.sub==="write";}).length, n=grp.length;
  if(status==="pending"){ var f=n===1?grp[0].file:null, verb=w>0?"Creating":"Editing"; return f?(verb+" "+f):(verb+" "+plural(n,"file")); }
  if(w===n) return "Created "+plural(n,"file");
  if(w>0) return "Changed "+plural(n,"file");
  return "Edited "+plural(n,"file");
}
function verifyTitle(e,status,friendly){
  var c=(e.cmd||"").toLowerCase();
  if(!friendly) return "Bash · "+e.cmd;
  if(c.indexOf("git diff")>=0) return status==="pending"?"Checking changes":"Checked changes";
  if(c.indexOf("export")>=0) return status==="pending"?"Preparing export":"Prepared export";
  if(c.indexOf("render")>=0) return status==="pending"?"Rendering preview":"Rendered preview";
  if(c.indexOf("lint")>=0||c.indexOf("test")>=0||c.indexOf("check")>=0) return status==="pending"?"Checking project":"Checked project";
  return status==="pending"?"Verifying preview":"Verified preview";
}
function verifySub(e){
  if((e.cmd||"").toLowerCase().indexOf("git diff")>=0) return "";
  if(e.exit&&e.exit!==0) return "The check needs attention before the preview is ready.";
  if(e.out&&/no issues|passed|success|ok/i.test(e.out)) return e.out.split("\n").find(Boolean)||"No issues found";
  return "";
}
function visualTitle(e,status,friendly){
  if(!friendly) return e.sub==="sheet"?"ripple frame-sheet":"ripple snapshot";
  if(e.sub==="sheet") return status==="pending"?"Reviewing motion over time":"Reviewed motion over time";
  return status==="pending"?"Checking current frame":"Checked current frame";
}

function build(){
  var r=state.rules, provider=state.provider, events=SCENARIOS[state.scenario].events;
  var act=events.filter(function(e){return e.family!=="text"&&e.family!=="usage"&&e.family!=="approval";});
  var liveIdx = (state.isLive && act.length) ? events.indexOf(act[act.length-1]) : -1;
  function st(idx){ return !state.isLive ? "done" : (idx>=liveIdx?"pending":"done"); }

  var items=[], advanced=[], replyText=null, usageEv=null, i=0;
  while(i<events.length){
    var e=events[i], f=e.family;
    if(f==="text"){ if(!state.isLive) replyText=e.text; i++; continue; }
    if(f==="usage"){ usageEv=e; advanced.push({h:"Usage",pre:e.in+" in · "+e.out+" out · "+(e.ms/1000).toFixed(1)+"s · "+e.model}); i++; continue; }
    if(f==="approval"){ items.push({kind:"approval",ev:e}); i++; continue; }

    if(f==="thinking"){
      var j=i,g=[]; while(j<events.length&&events[j].family==="thinking"){g.push(events[j]);j++;}
      var status=st(j-1), text=g.map(function(x){return x.text;}).filter(Boolean).join("\n\n");
      items.push({kind:"thinking",family:"thinking",status:status,
        title:r.thinkingUmbrella?(stripMd(text)||"Thinking").slice(0,96):"Thinking",
        details:(r.thinkingUmbrella&&text)?[{think:text}]:[], collapsible:r.thinkingUmbrella,
        from:g.map(function(x){return rawSource(x,provider);})});
      i=j; continue;
    }
    if(f==="explore"){
      var j2=i,g2=[]; if(r.coalesce){ while(j2<events.length&&events[j2].family==="explore"){g2.push(events[j2]);j2++;} } else { g2=[e]; j2=i+1; }
      var status2=st(j2-1);
      items.push({kind:"explored",family:"explore",status:status2,title:exploreTitle(g2,status2,r.friendly),collapsible:true,
        details:g2.map(function(x){return {label:rawSource(x,provider)};}),
        from:g2.map(function(x){return rawSource(x,provider);})});
      g2.forEach(function(x){ advanced.push({h:rawSource(x,provider),pre:""}); });
      i=j2; continue;
    }
    if(f==="visual"){
      var status3=st(i);
      items.push({kind:"visual",family:"visual",status:status3,title:visualTitle(e,status3,r.friendly),
        visual:r.inlineVisuals?(e.sub==="sheet"?"sheet":"snapshot"):null, from:[rawSource(e,provider)]});
      advanced.push({h:"Ripple visual tool",pre:rawSource(e,provider)});
      i++; continue;
    }
    if(f==="change"){
      var j3=i,g3=[]; if(r.coalesce){ while(j3<events.length&&events[j3].family==="change"){g3.push(events[j3]);j3++;} } else { g3=[e]; j3=i+1; }
      var status4=st(j3-1);
      items.push({kind:"change",family:"change",status:status4,title:editTitle(g3,status4,r.friendly),
        subtitle:(status4==="pending"&&g3.length===1)?diffStat(g3[0]):"",
        from:g3.map(function(x){return rawSource(x,provider);})});
      g3.forEach(function(x){ advanced.push({h:(x.sub==="write"?"Write ":"Edit ")+x.file,pre:"- "+(x.oldStr||"")+"\n+ "+(x.newStr||"")}); });
      i=j3; continue;
    }
    if(f==="verify"){
      var status5=st(i), isErr=e.exit&&e.exit!==0;
      items.push({kind:"verify",family:"verify",status:isErr?"error":status5,title:verifyTitle(e,status5,r.friendly),subtitle:verifySub(e),
        from:[rawSource(e,provider)]});
      advanced.push({h:"Command",pre:e.cmd+"\n"+(e.out||"")});
      i++; continue;
    }
    i++;
  }
  return {items:items,advanced:advanced,replyText:replyText,usageEv:usageEv,provider:provider};
}

/* ---------- render feed ---------- */
function row(item,r){
  var fam=FAM[item.family], pending=item.status==="pending", err=item.status==="error";
  var title=(pending&&r.liveShimmer)?('<span class="shimmer">'+esc(item.title)+'</span>'):esc(item.title);
  var fromLine = r.showMapping && item.from && item.from.length ? '<div class="from"><b>from</b> '+esc(item.from.join(", "))+'</div>' : '';

  if(item.kind==="thinking"){
    var hasD=item.details&&item.details.length;
    if(!hasD||!r.thinkingUmbrella) return '<div class="mrow thinking">'+svg("thinking")+'<span class="t">'+title+'</span></div>'+fromLine;
    return '<div class="mrow thinking coll" data-coll>'+svg("thinking")+'<span class="t">'+title+'</span><span class="chev">'+svg("chev")+'</span></div>'
      +'<div class="mdetails think" data-body hidden>'+esc(item.details[0].think)+'</div>'+fromLine;
  }
  if(item.kind==="explored"){
    var rows=item.details.map(function(d){return '<div class="d"><b>'+esc(d.label)+'</b></div>';}).join("");
    return '<div class="mrow coll" data-coll>'+svg(fam.icon)+'<span class="t">'+title+'</span><span class="chev">'+svg("chev")+'</span></div>'
      +'<div class="mdetails" data-body hidden>'+rows+'</div>'+fromLine;
  }
  var sub=item.subtitle?'<span class="s">'+esc(item.subtitle)+'</span>':'';
  var vis=item.visual?(item.visual==="sheet"?sheetVisual():snapVisual()):'';
  return '<div class="mrow'+(err?" err":"")+'">'+svg(fam.icon)+'<span class="t">'+title+'</span>'+sub+'</div>'+vis+fromLine;
}
function snapVisual(){ return '<div class="mvisual"><div class="frame"><div class="phone"></div></div><div class="cap">Current frame</div></div>'; }
function sheetVisual(){ return '<div class="mvisual sheet"><div class="frame"><div class="strip"><i></i><i></i><i></i><i></i></div></div><div class="cap">Frame sheet · 0s..1.5s</div></div>'; }
function approvalCard(e){
  var c=(e.cmd||"").toLowerCase(), action=c.indexOf("export")>=0?"export a preview":c.indexOf("render")>=0?"render a preview":"continue with a project operation";
  var who=state.provider==="claude"?"Claude":"Codex";
  return '<div class="approval-card"><div class="ah">'+svg("approval")+' '+esc(who)+' needs permission to '+esc(action)+'</div>'
    +'<div class="lines"><div class="l"><b>Action</b> '+esc(action)+'</div><div class="l"><b>Command</b> '+esc(e.cmd)+'</div></div>'
    +'<div class="acts"><button>Decline</button><button class="ok">Approve</button></div></div>';
}

function render(){
  try{
    var s=SCENARIOS[state.scenario], m=build(), r=state.rules;
    document.getElementById("topSub").textContent = (state.provider==="claude"?"Claude Agent SDK":"Codex app-server")+" → motion feed";
    document.getElementById("conv").innerHTML = '<b>'+(state.isLive?"streaming":"settled")+'</b> · '+esc(s.label);

    var html='<div class="umsg"><div class="bubble">'+esc(s.user)+'</div></div><div class="assistant">';
    m.items.forEach(function(item){ html += item.kind==="approval"?approvalCard(item.ev):row(item,r); });
    if(r.hideTechnical && m.advanced.length){
      html += '<button class="menu-btn" data-menu title="Show technical details">⋯</button>';
      html += '<div id="techWrap" hidden>'+m.advanced.map(function(a){return '<div class="tool-card"><div class="h">'+esc(a.h)+'</div>'+(a.pre?'<pre>'+esc(a.pre)+'</pre>':'')+'</div>';}).join("")+'</div>';
    } else if(!r.hideTechnical){
      html += m.advanced.map(function(a){return '<div class="tool-card"><div class="h">'+esc(a.h)+'</div>'+(a.pre?'<pre>'+esc(a.pre)+'</pre>':'')+'</div>';}).join("");
    }
    if(m.replyText) html += '<div class="reply">'+esc(m.replyText)+'</div>';
    if(r.showUsage && m.usageEv) html += '<div class="usage-line">'+m.usageEv.in+' in · '+m.usageEv.out+' out · '+(m.usageEv.ms/1000).toFixed(1)+'s · '+esc(m.usageEv.model)+'</div>';
    html += '</div>';
    document.getElementById("thread").innerHTML = html;

    renderControls(); renderPrompt(); syncChips();
  }catch(err){
    document.getElementById("thread").innerHTML = '<div class="errbox">Render error:\n'+esc(err && err.stack ? err.stack : err)+'</div>';
  }
}

function renderControls(){
  document.getElementById("controls").innerHTML = RULE_DEFS.map(function(d){
    return '<div class="control"><button class="toggle '+(state.rules[d[0]]?"on":"")+'" data-rule="'+d[0]+'"></button>'
      +'<div class="control-text"><strong>'+esc(d[1])+'</strong><span>'+esc(d[2])+'</span></div></div>';
  }).join("")
  + '<div class="control"><button class="toggle '+(state.isLive?"on":"")+'" data-live="1"></button>'
  + '<div class="control-text"><strong>Run is live</strong><span>Latest activity goes pending; the reply is withheld until it settles.</span></div></div>';
}
function renderPresets(){
  document.getElementById("presets").innerHTML = Object.keys(PRESETS).map(function(n){
    return '<button class="chip" data-preset="'+esc(n)+'">'+esc(n)+'<small>'+esc(PRESETS[n].desc)+'</small></button>';
  }).join("");
}
function renderScenarios(){
  document.getElementById("scenarioList").innerHTML = Object.keys(SCENARIOS).map(function(k){
    return '<button class="chip" data-scenario="'+esc(k)+'">'+esc(SCENARIOS[k].label)+'<small>'+esc(SCENARIOS[k].hint)+'</small></button>';
  }).join("");
}
function syncChips(){
  document.querySelectorAll("#providerSeg button").forEach(function(b){ b.classList.toggle("active", b.dataset.provider===state.provider); });
  document.querySelectorAll("#scenarioList .chip").forEach(function(b){ b.classList.toggle("active", b.dataset.scenario===state.scenario); });
}

/* ---------- prompt ---------- */
function renderPrompt(){
  var r=state.rules, lines=[];
  lines.push("Build Ripple's agent runtime feed (motion-editor chat + comments) for motion designers, not coders.");
  lines.push("");
  lines.push("Both providers feed the same UI: Claude Agent SDK native tools and Codex app-server JSON-RPC items / shell commands normalize to the same assistant parts, then roll up into the same activity rows.");
  lines.push("");
  lines.push("Render rules:");
  lines.push(r.friendly ? "- Use plain-language activities (Checked current frame, Changed motion, Checked project) instead of tool names." : "- Keep raw tool names and commands visible (developer view).");
  lines.push(r.coalesce ? "- Group consecutive reads/searches into one “Explored N files” umbrella, and consecutive edits into one “Changed N files” summary." : "- Show every read, search and edit as its own row (no grouping).");
  lines.push(r.thinkingUmbrella ? "- Show reasoning as one quiet “Thinking” row that previews the thought and expands to the full text." : "- Show reasoning as a plain Thinking line with no preview or expansion.");
  lines.push(r.inlineVisuals ? "- Render ripple snapshot / frame-sheet results as inline images." : "- Do not inline visual images.");
  lines.push(r.hideTechnical ? "- Tuck commands, diffs, paths and token usage behind a “…” technical menu." : "- Surface commands and diffs inline as tool cards (developer view).");
  if(r.showUsage) lines.push("- Show a faint token/cost footer.");
  if(r.liveShimmer) lines.push("- While streaming, shimmer the current activity as a single line and withhold the final reply until it settles.");
  if(r.showMapping) lines.push("- (Design note) annotate each row with the provider events it maps from.");
  document.getElementById("promptOut").textContent = lines.join("\n");
}

/* ---------- interactions ---------- */
document.addEventListener("click", function(e){
  var t;
  if((t=e.target.closest("[data-preset]"))){ var p=PRESETS[t.dataset.preset]; state.provider=p.provider; state.scenario=p.scenario; state.isLive=p.isLive; state.rules=makeRules(p.rules); render(); return; }
  if((t=e.target.closest("[data-provider]"))){ state.provider=t.dataset.provider; render(); return; }
  if((t=e.target.closest("[data-scenario]"))){ state.scenario=t.dataset.scenario; render(); return; }
  if((t=e.target.closest("[data-rule]"))){ state.rules[t.dataset.rule]=!state.rules[t.dataset.rule]; render(); return; }
  if((t=e.target.closest("[data-live]"))){ state.isLive=!state.isLive; render(); return; }
  if((t=e.target.closest("[data-menu]"))){ var w=document.getElementById("techWrap"); if(w){ w.hidden=!w.hidden; t.style.opacity=w.hidden?"":"1"; } return; }
  if((t=e.target.closest("[data-coll]"))){ var b=t.nextElementSibling; if(b&&b.hasAttribute("data-body")){ b.hidden=!b.hidden; t.classList.toggle("open",!b.hidden); } return; }
});

document.getElementById("copyBtn").addEventListener("click", function(){
  var text=document.getElementById("promptOut").textContent, btn=this;
  function done(){ btn.textContent="Copied!"; setTimeout(function(){ btn.textContent="Copy prompt"; },1000); }
  if(navigator.clipboard && navigator.clipboard.writeText){ navigator.clipboard.writeText(text).then(done).catch(fallback); } else { fallback(); }
  function fallback(){ var ta=document.createElement("textarea"); ta.value=text; document.body.appendChild(ta); ta.select(); try{document.execCommand("copy");}catch(e){} document.body.removeChild(ta); done(); }
});

/* ---------- boot ---------- */
renderPresets(); renderScenarios(); render();
</script>
</body>
</html>
