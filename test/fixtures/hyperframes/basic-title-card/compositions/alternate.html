<!doctype html>
<html>
  <head>
    <meta charset="utf-8">
    <title>Alternate Composition</title>
    <style>
      html,
      body {
        margin: 0;
        width: 100%;
        height: 100%;
        background: #08111f;
      }

      [data-composition-id="alternate"] {
        position: relative;
        width: 640px;
        height: 360px;
        overflow: hidden;
        background: linear-gradient(135deg, #1b1f3a, #3f3351 58%, #7dd3fc);
        color: white;
        font-family: Inter, system-ui, sans-serif;
      }

      .eyebrow {
        position: absolute;
        left: 46px;
        top: 48px;
        font-size: 13px;
        letter-spacing: 0;
        text-transform: uppercase;
        color: rgba(255, 255, 255, 0.72);
      }

      .title {
        position: absolute;
        left: 44px;
        top: 96px;
        max-width: 420px;
        font-size: 42px;
        font-weight: 760;
        line-height: 1;
        letter-spacing: 0;
      }
    </style>
  </head>
  <body>
    <main
      data-composition-id="alternate"
      data-width="640"
      data-height="360"
      data-duration="2"
      data-fps="30"
    >
      <section class="clip" data-start="0" data-duration="2" data-track-index="0">
        <div class="eyebrow">Composition switch fixture</div>
        <div class="title">Alternate timeline</div>
      </section>
    </main>
    <script src="../assets/vendor/gsap.min.js"></script>
    <script>
      window.__timelines = window.__timelines || {};
      const tl = window.gsap.timeline({ paused: true });
      tl
        .fromTo(".eyebrow", { opacity: 0, y: -8 }, { opacity: 1, y: 0, duration: 0.35, ease: "power2.out" }, 0)
        .fromTo(".title", { opacity: 0, x: -18 }, { opacity: 1, x: 0, duration: 0.6, ease: "power2.out" }, 0.15)
        .to(".title", { opacity: 0.9, duration: 0.5 }, 1.25);
      window.__timelines.alternate = tl;
    </script>
  </body>
</html>
