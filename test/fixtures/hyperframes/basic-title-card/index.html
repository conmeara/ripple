<!doctype html>
<html>
  <head>
    <meta charset="utf-8">
    <title>Basic Title Card</title>
    <style>
      html,
      body {
        margin: 0;
        width: 100%;
        height: 100%;
        background: #050505;
      }

      [data-composition-id="main"] {
        position: relative;
        width: 640px;
        height: 360px;
        overflow: hidden;
        background: linear-gradient(135deg, #101820, #1f3a3d 55%, #ffd166);
        color: white;
        font-family: Inter, system-ui, sans-serif;
      }

      .title {
        position: absolute;
        left: 48px;
        bottom: 56px;
        font-size: 46px;
        font-weight: 750;
        letter-spacing: 0;
      }

      .subtitle {
        position: absolute;
        left: 52px;
        bottom: 36px;
        font-size: 15px;
        color: rgba(255, 255, 255, 0.78);
      }
    </style>
  </head>
  <body>
    <main
      data-composition-id="main"
      data-width="640"
      data-height="360"
      data-duration="1"
      data-fps="30"
    >
      <section class="clip" data-start="0" data-duration="1" data-track-index="0">
        <div class="title">Ripple</div>
        <div class="subtitle">Deterministic export fixture</div>
      </section>
    </main>
    <script src="./assets/vendor/gsap.min.js"></script>
    <script>
      window.__timelines = window.__timelines || {};
      const tl = window.gsap.timeline({ paused: true });
      tl
        .fromTo(".title", { opacity: 0, y: 16 }, { opacity: 1, y: 0, duration: 0.5, ease: "power2.out" }, 0)
        .fromTo(".subtitle", { opacity: 0, y: 8 }, { opacity: 1, y: 0, duration: 0.35, ease: "power2.out" }, 0.25)
        .to(".title", { opacity: 0.94, duration: 0.25 }, 0.75);
      window.__timelines.main = tl;
    </script>
  </body>
</html>
