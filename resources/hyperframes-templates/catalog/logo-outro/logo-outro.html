<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=1920, height=1080" />
    <title>Logo Outro</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=block"
      rel="stylesheet"
    />
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      html,
      body {
        margin: 0;
        width: 1920px;
        height: 1080px;
        overflow: hidden;
        background: #0a0a0f;
      }
    </style>
  </head>
  <body>
    <div
      id="logo-outro"
      data-composition-id="logo-outro"
      data-width="1920"
      data-height="1080"
      data-start="0"
      data-duration="6"
    >
      <div class="canvas">
        <!-- Glow effect behind the logo -->
        <div class="logo-glow"></div>

        <!-- Logo Container -->
        <div class="logo-container">
          <svg viewBox="0 0 560 560" width="240" height="240" class="logo-svg" aria-label="Ripple logo">
            <g stroke="currentColor" stroke-width="31" stroke-linecap="round" stroke-linejoin="round">
              <path class="logo-piece logo-left" d="M197 213L139 280L197 347" />
              <path class="logo-piece logo-right" d="M363 213L421 280L363 347" />
            </g>
            <rect class="logo-piece logo-playhead" x="262" y="84" width="36" height="392" rx="18" fill="currentColor" />
          </svg>
        </div>

        <div class="text-container">
          <div class="tagline">Make motion feel effortless.</div>
          <div class="url-pill">
            <span class="url-text">ripple.app</span>
          </div>
        </div>
      </div>

      <style>
        [data-composition-id="logo-outro"] .canvas {
          width: 1920px;
          height: 1080px;
          background: #0a0a0f;
          position: relative;
          overflow: hidden;
          font-family: "Inter", sans-serif;
        }

        [data-composition-id="logo-outro"] .logo-container {
          position: absolute;
          left: 840px;
          top: 314px;
          width: 240px;
          height: 240px;
          z-index: 2;
        }

        [data-composition-id="logo-outro"] .logo-svg {
          color: #f7f7f7;
          overflow: visible;
          filter: drop-shadow(0 0 18px rgba(255, 255, 255, 0.2))
            drop-shadow(0 22px 28px rgba(0, 0, 0, 0.35));
        }

        [data-composition-id="logo-outro"] .logo-piece {
          transform-box: fill-box;
          transform-origin: center center;
          opacity: 0;
        }

        [data-composition-id="logo-outro"] .logo-glow {
          position: absolute;
          left: 750px;
          top: 230px;
          width: 400px;
          height: 400px;
          background: radial-gradient(circle, rgba(255, 255, 255, 0.22) 0%, rgba(10, 10, 15, 0) 70%);
          border-radius: 50%;
          opacity: 0;
          pointer-events: none;
          z-index: 1;
        }

        [data-composition-id="logo-outro"] .text-container {
          position: absolute;
          top: 720px;
          width: 100%;
          display: flex;
          flex-direction: column;
          align-items: center;
          z-index: 3;
        }

        [data-composition-id="logo-outro"] .tagline {
          font-size: 44px;
          font-weight: 500;
          color: white;
          opacity: 0;
          margin-bottom: 32px;
          text-align: center;
        }

        [data-composition-id="logo-outro"] .url-pill {
          background: #1a1a1f;
          border: 1px solid #2c2c2c;
          border-radius: 100px;
          padding: 8px 24px;
          opacity: 0;
          display: flex;
          align-items: center;
          justify-content: center;
        }

        [data-composition-id="logo-outro"] .url-text {
          font-size: 18px;
          color: #666;
          letter-spacing: 0.5px;
        }
      </style>

      <script>
        (function () {
          const tl = gsap.timeline({ paused: true });

          const pieces = {
            left: '[data-composition-id="logo-outro"] .logo-left',
            playhead: '[data-composition-id="logo-outro"] .logo-playhead',
            right: '[data-composition-id="logo-outro"] .logo-right',
          };

          const pieceArray = [pieces.left, pieces.playhead, pieces.right];
          const logoGlow = '[data-composition-id="logo-outro"] .logo-glow';
          const tagline = '[data-composition-id="logo-outro"] .tagline';
          const urlPill = '[data-composition-id="logo-outro"] .url-pill';

          // 1. The tray mark assembles from the playhead outward.
          tl.fromTo(
            pieces.playhead,
            { y: -220, opacity: 0 },
            { y: 0, opacity: 1, duration: 0.85, ease: "power4.out" },
            0,
          );
          tl.fromTo(
            pieces.left,
            { x: -260, opacity: 0 },
            { x: 0, opacity: 1, duration: 0.9, ease: "power4.out" },
            0.18,
          );
          tl.fromTo(
            pieces.right,
            { x: 260, opacity: 0 },
            { x: 0, opacity: 1, duration: 0.9, ease: "power4.out" },
            0.26,
          );

          // 2. Expand and close
          const expandTime = 1.2;

          tl.to(
            pieceArray,
            { scale: 1.15, duration: 0.5, ease: "back.out(1.7)", stagger: 0.02 },
            expandTime,
          );

          tl.to(pieceArray, { scale: 1, duration: 0.4, ease: "power2.inOut" }, expandTime + 0.3);

          // 3. Glow bloom
          tl.fromTo(
            logoGlow,
            { opacity: 0, scale: 0.5 },
            { opacity: 1, scale: 1.2, duration: 0.4, ease: "power2.out" },
            expandTime,
          );
          tl.to(
            logoGlow,
            { opacity: 0, scale: 1.8, duration: 1.2, ease: "power2.out" },
            expandTime + 0.4,
          );

          // 4. Tagline and URL pill fade in
          const textStartTime = expandTime + 0.8;
          tl.fromTo(
            tagline,
            { opacity: 0, y: 20 },
            { opacity: 1, y: 0, duration: 1, ease: "power3.out" },
            textStartTime,
          );

          tl.fromTo(
            urlPill,
            { opacity: 0, y: 15 },
            { opacity: 1, y: 0, duration: 0.8, ease: "power3.out" },
            textStartTime + 0.4,
          );

          window.__timelines = window.__timelines || {};
          window.__timelines["logo-outro"] = tl;
        })();
      </script>
    </div>
  </body>
</html>
