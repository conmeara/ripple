        tl

          .fromTo(root.querySelector(".ripple-block-card"), { opacity: 0, y: 54, scale: 0.985 }, { opacity: 1, y: 0, scale: 1, duration: 0.52, ease: "power3.out" }, 0)

          .to(root.querySelector(".ripple-block-card"), { opacity: 0, y: -24, duration: 0.42, ease: "power2.in" }, Math.max(0, {{DURATION}} - 0.48))

        window.__timelines["{{COMPOSITION_ID}}"] = tl;
      })();
