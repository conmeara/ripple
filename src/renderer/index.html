<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta http-equiv="Content-Security-Policy" content="default-src 'self' 'unsafe-inline' 'unsafe-eval'; script-src 'self' 'unsafe-inline' 'unsafe-eval' ripple-preview: https://unpkg.com https://*.posthog.com https://*.i.posthog.com; style-src 'self' 'unsafe-inline' ripple-preview:; connect-src 'self' ripple-preview: ws://localhost:* http://localhost:* https://unpkg.com https://*.posthog.com https://*.i.posthog.com; img-src 'self' data: blob: ripple-preview: https:; media-src 'self' data: blob: ripple-preview:; frame-src 'self' blob: ripple-preview:;" />
    <title>Ripple</title>
    <!-- Prevent theme flash: detect system/stored theme before render -->
    <script>
      (function() {
        var stored = localStorage.getItem('theme');
        var prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
        var theme = stored === 'light' ? 'light' : stored === 'dark' ? 'dark' : (prefersDark ? 'dark' : 'light');
        document.documentElement.classList.add(theme);
      })();
    </script>
    <style>
      /* Loading state before React loads - respects system theme */
      :root {
        --loading-bg: #ffffff;
        --loading-text: #09090b;
        --loading-logo: #a1a1aa;
      }
      .dark {
        --loading-bg: #09090b;
        --loading-text: #fafafa;
        --loading-logo: #71717a;
      }
      body {
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        margin: 0;
        background: var(--loading-bg);
        color: var(--loading-text);
      }
      /* Loading container - hidden when React renders */
      .loading-container {
        position: fixed;
        inset: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        background: var(--loading-bg);
        z-index: 9999;
        transition: opacity 150ms ease-out;
      }
      /* Hide loading when root has content */
      #root:not(:empty) + .loading-container,
      #root:not(:empty) ~ .loading-container {
        opacity: 0;
        pointer-events: none;
      }
      .loading-logo {
        width: 24px;
        height: 24px;
        animation: pulse 1.5s ease-in-out infinite;
      }
      @keyframes pulse {
        0%, 100% { opacity: 0.3; }
        50% { opacity: 0.6; }
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <!-- Loading indicator - separate from root so :empty works -->
    <div class="loading-container">
      <svg class="loading-logo" viewBox="0 0 1024 1024" fill="none" xmlns="http://www.w3.org/2000/svg" aria-label="Ripple loading">
        <defs>
          <linearGradient id="loading-leftFade" x1="140" y1="0" x2="426" y2="0" gradientUnits="userSpaceOnUse">
            <stop stop-color="white" stop-opacity="0"/>
            <stop offset="0.43" stop-color="white" stop-opacity="0.48"/>
            <stop offset="0.84" stop-color="white" stop-opacity="0.98"/>
            <stop offset="1" stop-color="white"/>
          </linearGradient>
          <linearGradient id="loading-rightFade" x1="598" y1="0" x2="884" y2="0" gradientUnits="userSpaceOnUse">
            <stop stop-color="white"/>
            <stop offset="0.16" stop-color="white" stop-opacity="0.98"/>
            <stop offset="0.57" stop-color="white" stop-opacity="0.48"/>
            <stop offset="1" stop-color="white" stop-opacity="0"/>
          </linearGradient>
          <linearGradient id="loading-playhead" x1="512" y1="198" x2="512" y2="826" gradientUnits="userSpaceOnUse">
            <stop stop-color="#FFFFFF"/>
            <stop offset="0.56" stop-color="#F7F7F7"/>
            <stop offset="1" stop-color="#E4E4E4"/>
          </linearGradient>
          <filter id="loading-softStreak" x="-70" y="-20" width="420" height="62" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
            <feGaussianBlur stdDeviation="17 4"/>
          </filter>
          <filter id="loading-barShadow" x="448" y="164" width="128" height="700" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
            <feDropShadow dx="0" dy="0" stdDeviation="8" flood-color="#FFFFFF" flood-opacity="0.1"/>
            <feDropShadow dx="0" dy="18" stdDeviation="18" flood-color="#000000" flood-opacity="0.3"/>
          </filter>
          <clipPath id="loading-tileClip">
            <rect x="48" y="48" width="928" height="928" rx="150"/>
          </clipPath>
        </defs>
        <g clip-path="url(#loading-tileClip)">
          <rect x="48" y="48" width="928" height="928" rx="150" fill="#050505"/>
          <g opacity="0.3" filter="url(#loading-softStreak)">
            <path d="M140 330H430" stroke="url(#loading-leftFade)" stroke-width="25" stroke-linecap="round"/>
            <path d="M116 402H404" stroke="url(#loading-leftFade)" stroke-width="25" stroke-linecap="round"/>
            <path d="M108 474H430" stroke="url(#loading-leftFade)" stroke-width="25" stroke-linecap="round"/>
            <path d="M120 546H404" stroke="url(#loading-leftFade)" stroke-width="25" stroke-linecap="round"/>
            <path d="M148 618H430" stroke="url(#loading-leftFade)" stroke-width="25" stroke-linecap="round"/>
            <path d="M594 330H884" stroke="url(#loading-rightFade)" stroke-width="25" stroke-linecap="round"/>
            <path d="M620 402H908" stroke="url(#loading-rightFade)" stroke-width="25" stroke-linecap="round"/>
            <path d="M594 474H916" stroke="url(#loading-rightFade)" stroke-width="25" stroke-linecap="round"/>
            <path d="M620 546H904" stroke="url(#loading-rightFade)" stroke-width="25" stroke-linecap="round"/>
            <path d="M594 618H876" stroke="url(#loading-rightFade)" stroke-width="25" stroke-linecap="round"/>
          </g>
          <g>
            <path d="M234 330H424" stroke="url(#loading-leftFade)" stroke-width="23" stroke-linecap="round"/>
            <path d="M162 402H386" stroke="url(#loading-leftFade)" stroke-width="23" stroke-linecap="round"/>
            <path d="M142 474H424" stroke="url(#loading-leftFade)" stroke-width="23" stroke-linecap="round"/>
            <path d="M162 546H386" stroke="url(#loading-leftFade)" stroke-width="23" stroke-linecap="round"/>
            <path d="M234 618H424" stroke="url(#loading-leftFade)" stroke-width="23" stroke-linecap="round"/>
            <path d="M600 330H790" stroke="url(#loading-rightFade)" stroke-width="23" stroke-linecap="round"/>
            <path d="M638 402H862" stroke="url(#loading-rightFade)" stroke-width="23" stroke-linecap="round"/>
            <path d="M600 474H882" stroke="url(#loading-rightFade)" stroke-width="23" stroke-linecap="round"/>
            <path d="M638 546H862" stroke="url(#loading-rightFade)" stroke-width="23" stroke-linecap="round"/>
            <path d="M600 618H790" stroke="url(#loading-rightFade)" stroke-width="23" stroke-linecap="round"/>
          </g>
          <g filter="url(#loading-barShadow)">
            <rect x="474" y="198" width="76" height="628" rx="26" fill="url(#loading-playhead)"/>
          </g>
        </g>
      </svg>
    </div>
    <script>
      console.log("[HTML] Inline script running - scripts work!");
      window.onerror = function(msg, url, line) {
        console.error("[HTML] Global error:", msg, "at", url, "line", line);
        document.getElementById("root").innerHTML = "<pre style='color:red;padding:20px'>Error: " + msg + "</pre>";
      };
    </script>
    <script type="module" src="./main.tsx"></script>
  </body>
</html>
