<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ripple Runtime Chat UI Comparator</title>
<style>
:root {
  --bg: #090909;
  --panel: #111111;
  --panel-2: #151515;
  --surface: #1f1f1f;
  --surface-2: #272727;
  --border: rgba(255,255,255,0.08);
  --border-strong: rgba(255,255,255,0.14);
  --text: #e8e8e8;
  --muted: #8d8d8d;
  --faint: #5f5f5f;
  --accent: #9dbce8;
  --green: #56c287;
  --amber: #d7b56d;
  --red: #df7c68;
  --mono: "SFMono-Regular", "Cascadia Code", Consolas, monospace;
  --sans: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
}

*,
*::before,
*::after {
  box-sizing: border-box;
}

body {
  margin: 0;
  min-height: 100vh;
  overflow: hidden;
  background: var(--bg);
  color: var(--text);
  font-family: var(--sans);
  line-height: 1.45;
}

button,
textarea,
input,
select {
  font: inherit;
}

button {
  color: inherit;
}

.app {
  display: grid;
  grid-template-columns: minmax(0, 1fr) 360px;
  height: 100vh;
}

.main {
  min-width: 0;
  display: flex;
  flex-direction: column;
}

.topbar {
  height: 44px;
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 0 16px;
  border-bottom: 1px solid var(--border);
  background: #0f0f0f;
}

.mark {
  width: 22px;
  height: 22px;
  display: grid;
  place-items: center;
  border-radius: 6px;
  background: #252c37;
  color: #d8e9ff;
  font-family: var(--mono);
  font-size: 12px;
  font-weight: 700;
}

.title {
  min-width: 0;
}

.title strong {
  display: block;
  font-size: 13px;
  font-weight: 650;
}

.title span {
  display: block;
  color: var(--muted);
  font-size: 11px;
}

.top-controls {
  margin-left: auto;
  display: flex;
  align-items: center;
  gap: 8px;
}

.segmented {
  display: inline-grid;
  grid-auto-flow: column;
  gap: 2px;
  padding: 3px;
  border: 1px solid var(--border);
  border-radius: 8px;
  background: #181818;
}

.segmented button {
  min-width: 78px;
  padding: 5px 9px;
  border: 0;
  border-radius: 6px;
  background: transparent;
  color: var(--muted);
  cursor: pointer;
  font-size: 12px;
}

.segmented button.active {
  background: #343434;
  color: var(--text);
}

.canvas {
  min-height: 0;
  flex: 1;
  overflow: auto;
  padding: 18px;
}

.compare {
  display: grid;
  grid-template-columns: repeat(2, minmax(360px, 1fr));
  gap: 18px;
  align-items: start;
}

.compare[data-mode="onecode"] .pane.ripple,
.compare[data-mode="ripple"] .pane.onecode {
  display: none;
}

.compare[data-mode="onecode"],
.compare[data-mode="ripple"] {
  grid-template-columns: minmax(420px, 760px);
  justify-content: center;
}

.pane {
  min-width: 0;
  border: 1px solid var(--border);
  border-radius: 10px;
  background: #101010;
  overflow: hidden;
}

.pane-head {
  height: 42px;
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 0 12px;
  border-bottom: 1px solid var(--border);
  background: #151515;
}

.pane-head strong {
  font-size: 13px;
  font-weight: 650;
}

.pane-head span {
  color: var(--muted);
  font-size: 11px;
}

.badge {
  margin-left: auto;
  display: inline-flex;
  align-items: center;
  gap: 6px;
  color: var(--green);
  font-size: 11px;
}

.badge::before {
  content: "";
  width: 6px;
  height: 6px;
  border-radius: 999px;
  background: var(--green);
}

.thread {
  height: min(720px, calc(100vh - 122px));
  overflow-y: auto;
  overflow-x: hidden;
  padding: 14px 10px 18px;
  background: #0c0c0c;
}

.thread::-webkit-scrollbar,
.side-scroll::-webkit-scrollbar {
  width: 6px;
}

.thread::-webkit-scrollbar-thumb,
.side-scroll::-webkit-scrollbar-thumb {
  border-radius: 999px;
  background: rgba(255,255,255,0.14);
}

.user {
  display: flex;
  justify-content: flex-end;
  margin: 8px 2px 18px;
}

.bubble {
  max-width: 78%;
  padding: 10px 12px;
  border-radius: 10px;
  background: var(--surface);
  color: var(--text);
  font-size: 13px;
}

.assistant {
  width: 100%;
  min-width: 0;
  display: flex;
  flex-direction: column;
  gap: 1px;
  overflow: hidden;
}

.row {
  position: relative;
  min-height: 23px;
  width: 100%;
  max-width: 100%;
  display: flex;
  align-items: center;
  gap: 6px;
  padding: 2px 8px;
  border-radius: 6px;
  color: var(--muted);
  font-size: 12px;
}

.row:hover {
  background: rgba(255,255,255,0.035);
}

.row .label {
  min-width: 0;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
  color: var(--muted);
  font-weight: 600;
}

.row-icon {
  width: 14px;
  height: 14px;
  display: inline-grid;
  place-items: center;
  flex: 0 0 auto;
  border: 1px solid rgba(141,141,141,0.7);
  border-radius: 999px;
  color: var(--muted);
  font-size: 9px;
  line-height: 1;
}

.row-icon.check::before {
  content: "✓";
}

.row-icon.pencil {
  border: 0;
  font-size: 13px;
}

.row-icon.pencil::before {
  content: "✎";
}

.row-icon.check {
  color: #8f8a77;
}

.row-icon.explore {
  border: 0;
  font-size: 13px;
}

.row-icon.explore::before {
  content: "⌘";
}

.row .sub {
  min-width: 0;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
  color: var(--faint);
}

.row .chev {
  width: 14px;
  color: var(--faint);
  opacity: 0;
  transition: opacity 140ms ease, transform 140ms ease;
}

.row.disclosure {
  cursor: pointer;
}

.row.disclosure:hover .chev,
.row.disclosure.open .chev {
  opacity: 1;
}

.row.disclosure.open .chev {
  transform: rotate(90deg);
}

.shimmer {
  display: inline-block;
  color: transparent;
  background: linear-gradient(90deg, var(--muted), #e9e9e9, var(--muted));
  background-size: 220% 100%;
  -webkit-background-clip: text;
  background-clip: text;
  animation: shimmer 1.2s linear infinite;
}

@keyframes shimmer {
  from { background-position: 200% 0; }
  to { background-position: -20% 0; }
}

.details {
  display: none;
  padding: 8px 8px 10px;
  color: var(--muted);
  font-size: 12px;
}

.details.open {
  display: block;
}

.details .markdown {
  max-height: 130px;
  overflow: auto;
  padding-right: 6px;
}

.details p {
  margin: 0 0 8px;
}

.tool-card {
  margin: 4px 2px;
  max-width: calc(100% - 4px);
  border: 1px solid var(--border);
  border-radius: 8px;
  background: #141414;
  overflow: hidden;
}

.tool-card .tool-head {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 8px 10px;
  font-size: 12px;
  color: var(--muted);
}

.tool-card pre {
  margin: 0;
  padding: 8px 10px 10px;
  border-top: 1px solid var(--border);
  color: #a6a6a6;
  font-family: var(--mono);
  font-size: 10.5px;
  line-height: 1.55;
  white-space: pre-wrap;
}

.diff-stat {
  font-size: 11px;
  font-family: var(--mono);
  font-weight: 600;
}

.diff-stat.add {
  color: #a3be8c;
}

.diff-stat.remove {
  color: #ae5a62;
}

.usage {
  padding: 2px 8px 0;
  color: rgba(141,141,141,0.5);
  font-size: 11px;
}

.visual {
  margin: 4px 8px 8px;
  overflow: hidden;
  width: clamp(260px, 76%, 540px);
  max-width: calc(100% - 16px);
  border: 1px solid var(--border);
  border-radius: 8px;
  background: #151515;
}

.visual-frame {
  aspect-ratio: 16 / 9;
  display: grid;
  place-items: center;
  background:
    radial-gradient(circle at 55% 30%, rgba(151,95,255,0.45), transparent 32%),
    linear-gradient(135deg, #8b43ff, #3c1678);
}

.phone {
  width: 56px;
  height: 104px;
  border: 4px solid #111;
  border-radius: 16px;
  background:
    linear-gradient(#1c1c1c, #080808);
  box-shadow: 0 12px 30px rgba(0,0,0,0.45);
  position: relative;
}

.phone::before {
  content: "";
  position: absolute;
  left: 18px;
  top: 6px;
  width: 18px;
  height: 4px;
  border-radius: 999px;
  background: #050505;
}

.phone::after {
  content: "2/3";
  position: absolute;
  inset: 0;
  display: grid;
  place-items: center;
  color: #d9f56c;
  font-size: 12px;
  font-weight: 700;
}

.visual-caption {
  padding: 6px 9px;
  border-top: 1px solid var(--border);
  color: var(--faint);
  font-size: 11px;
}

.reply {
  padding: 8px;
  max-width: 100%;
  color: #d4d4d4;
  font-size: 13px;
  line-height: 1.55;
  overflow-wrap: anywhere;
}

.reply code {
  padding: 1px 4px;
  border-radius: 5px;
  background: rgba(255,255,255,0.08);
  font-family: var(--mono);
  font-size: 0.9em;
}

.menu-dots {
  margin-left: auto;
  opacity: 0;
  color: var(--faint);
}

.assistant:hover .menu-dots,
.row:hover .menu-dots {
  opacity: 1;
}

.side {
  min-width: 0;
  border-left: 1px solid var(--border);
  background: #101010;
  display: flex;
  flex-direction: column;
}

.side-head {
  height: 44px;
  padding: 0 14px;
  display: flex;
  align-items: center;
  border-bottom: 1px solid var(--border);
}

.side-head strong {
  font-size: 13px;
}

.side-scroll {
  min-height: 0;
  flex: 1;
  overflow: auto;
  padding: 14px;
}

.section {
  margin-bottom: 18px;
}

.section-title {
  margin-bottom: 8px;
  color: var(--muted);
  font-size: 11px;
  font-weight: 700;
  letter-spacing: 0.08em;
  text-transform: uppercase;
}

.preset-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 8px;
}

.preset {
  min-height: 38px;
  border: 1px solid var(--border);
  border-radius: 8px;
  background: #171717;
  color: var(--muted);
  cursor: pointer;
  font-size: 12px;
}

.preset.active,
.preset:hover {
  border-color: rgba(157,188,232,0.36);
  color: var(--text);
  background: #1d2229;
}

.control {
  display: flex;
  align-items: flex-start;
  gap: 10px;
  padding: 9px 0;
  border-bottom: 1px solid rgba(255,255,255,0.045);
}

.toggle {
  width: 31px;
  height: 18px;
  margin-top: 1px;
  border: 1px solid rgba(255,255,255,0.12);
  border-radius: 999px;
  background: #222;
  cursor: pointer;
  position: relative;
  flex: 0 0 auto;
}

.toggle::after {
  content: "";
  position: absolute;
  width: 14px;
  height: 14px;
  left: 1px;
  top: 1px;
  border-radius: 999px;
  background: #8b8b8b;
  transition: transform 140ms ease, background 140ms ease;
}

.toggle.on {
  background: rgba(86,194,135,0.24);
  border-color: rgba(86,194,135,0.34);
}

.toggle.on::after {
  transform: translateX(13px);
  background: #7ee0a6;
}

.control-text {
  min-width: 0;
}

.control-text strong {
  display: block;
  color: var(--text);
  font-size: 12px;
  font-weight: 650;
}

.control-text span {
  display: block;
  color: var(--faint);
  font-size: 11px;
  line-height: 1.35;
}

.field {
  display: grid;
  gap: 6px;
  margin-bottom: 11px;
}

.field label {
  color: var(--muted);
  font-size: 11px;
  font-weight: 650;
}

.field textarea {
  width: 100%;
  min-height: 68px;
  resize: vertical;
  border: 1px solid var(--border);
  border-radius: 8px;
  background: #151515;
  color: var(--text);
  padding: 9px;
  font-size: 12px;
  line-height: 1.45;
}

.field textarea.small {
  min-height: 46px;
}

.prompt {
  border: 1px solid var(--border);
  border-radius: 8px;
  background: #151515;
  overflow: hidden;
}

.prompt pre {
  min-height: 106px;
  max-height: 210px;
  overflow: auto;
  margin: 0;
  padding: 10px;
  color: var(--muted);
  font-family: var(--mono);
  font-size: 11px;
  white-space: pre-wrap;
}

.copy {
  width: 100%;
  height: 34px;
  border: 0;
  border-top: 1px solid var(--border);
  background: #1d1d1d;
  color: var(--text);
  cursor: pointer;
  font-size: 12px;
}

@media (max-width: 1180px) {
  .app {
    grid-template-columns: 1fr;
  }
  .side {
    display: none;
  }
}
</style>
</head>
<body>
<div class="app">
  <main class="main">
    <header class="topbar">
      <div class="mark">R</div>
      <div class="title">
        <strong>Ripple Runtime Chat UI Comparator</strong>
        <span>Compare legacy 1Code behavior with the current Ripple motion-editor feed.</span>
      </div>
      <div class="top-controls">
        <div class="segmented" aria-label="Preview mode">
          <button data-view="compare" class="active">Compare</button>
          <button data-view="onecode">1Code</button>
          <button data-view="ripple">Ripple</button>
        </div>
      </div>
    </header>

    <section class="canvas">
      <div class="compare" id="compare" data-mode="compare">
        <article class="pane onecode">
          <div class="pane-head">
            <strong>1Code original</strong>
            <span>developer-agent surface</span>
            <span class="badge">running</span>
          </div>
          <div class="thread" id="onecode-thread"></div>
        </article>

        <article class="pane ripple">
          <div class="pane-head">
            <strong>Ripple now</strong>
            <span>motion-editor surface</span>
            <span class="badge">running</span>
          </div>
          <div class="thread" id="ripple-thread"></div>
        </article>
      </div>
    </section>
  </main>

  <aside class="side">
    <div class="side-head">
      <strong>Runtime UI editor</strong>
    </div>
    <div class="side-scroll">
      <section class="section">
        <div class="section-title">Presets</div>
        <div class="preset-grid">
          <button class="preset active" data-preset="baseline">Compare baseline</button>
          <button class="preset" data-preset="target">Codex target</button>
          <button class="preset" data-preset="onecode">1Code original</button>
          <button class="preset" data-preset="noisy">Noisy failure</button>
        </div>
      </section>

      <section class="section">
        <div class="section-title">Options</div>
        <div id="controls"></div>
      </section>

      <section class="section">
        <div class="section-title">Conversation copy</div>
        <div class="field">
          <label for="userText">User message</label>
          <textarea id="userText" class="small"></textarea>
        </div>
        <div class="field">
          <label for="activeText">Current activity label</label>
          <textarea id="activeText" class="small"></textarea>
        </div>
        <div class="field">
          <label for="reasoningText">Thinking umbrella content</label>
          <textarea id="reasoningText"></textarea>
        </div>
        <div class="field">
          <label for="replyText">Agent reply</label>
          <textarea id="replyText"></textarea>
        </div>
      </section>

      <section class="section">
        <div class="section-title">Generated direction</div>
        <div class="prompt">
          <pre id="promptOutput"></pre>
          <button class="copy" id="copyPrompt">Copy direction</button>
        </div>
      </section>
    </div>
  </aside>
</div>

<script>
const DEFAULTS = {
  view: "compare",
  showOneCodeRawTools: true,
  oneCodeThinkingPreview: true,
  rippleHideTechnical: true,
  rippleShowVisual: true,
  rippleDuplicateThinking: false,
  rippleThinkingSubtitle: false,
  rippleThinkingUmbrella: true,
  rippleFaithfulActivityLabels: false,
  rippleCombineChangeCheck: false,
  rippleShowActiveEdit: false,
  liveShimmer: true,
  expandedThinking: false,
  showFinalReply: true,
  userText: "whats on the screen",
  activeText: "Thinking",
  reasoningText: "I need to inspect the current frame first, then use the visual result to answer in motion-editor language instead of exposing commands or file paths.",
  replyText: "The current Ripple frame shows a centered phone mockup on a deep purple background. Inside the phone is a dark fitness/coaching dashboard with a weekly goal card, progress ring, weekday dots, and activity rows."
};

const state = { ...DEFAULTS };

const controlDefs = [
  ["liveShimmer", "Simple shimmer for current item", "Current work appears as one shimmering line, like Codex."],
  ["rippleThinkingUmbrella", "Thinking opens as umbrella", "Completed reasoning can be twirled open without cluttering the transcript."],
  ["rippleThinkingSubtitle", "Show Thinking subtitle", "Recreates the busier line: Thinking plus explanatory copy."],
  ["rippleDuplicateThinking", "Duplicate Thinking row", "Use this to show the failure case from the screenshot."],
  ["rippleShowVisual", "Show visual snapshot", "Keeps Ripple’s visual check inline in the chronological feed."],
  ["rippleFaithfulActivityLabels", "Use faithful activity umbrellas", "Names what actually happened: explored files, updated a source, ran a check."],
  ["rippleCombineChangeCheck", "Combine edit and check", "Shows one Codex-style summary row with details inside the umbrella."],
  ["rippleShowActiveEdit", "Show active edit detail", "Current edits show the filename and change count while they are happening."],
  ["rippleHideTechnical", "Hide developer details", "Commands, paths, diffs, and usage stay behind the menu."],
  ["showOneCodeRawTools", "1Code raw tool rows", "Shows the more developer-oriented tool cards from the original surface."],
  ["oneCodeThinkingPreview", "1Code thought preview", "Shows the old collapsed Thought preview text after thinking completes."],
  ["expandedThinking", "Expand thinking", "Opens the reasoning body in both previews."],
  ["showFinalReply", "Show final reply", "Includes the markdown response after runtime activity."]
];

const presets = {
  baseline: {
    showOneCodeRawTools: true,
    oneCodeThinkingPreview: true,
    rippleHideTechnical: true,
    rippleShowVisual: true,
    rippleDuplicateThinking: false,
    rippleThinkingSubtitle: false,
    rippleThinkingUmbrella: true,
    rippleFaithfulActivityLabels: false,
    rippleCombineChangeCheck: false,
    rippleShowActiveEdit: false,
    liveShimmer: true,
    expandedThinking: false,
    showFinalReply: true
  },
  target: {
    showOneCodeRawTools: true,
    oneCodeThinkingPreview: true,
    rippleHideTechnical: true,
    rippleShowVisual: true,
    rippleDuplicateThinking: false,
    rippleThinkingSubtitle: false,
    rippleThinkingUmbrella: true,
    rippleFaithfulActivityLabels: true,
    rippleCombineChangeCheck: true,
    rippleShowActiveEdit: true,
    liveShimmer: true,
    expandedThinking: false,
    showFinalReply: true
  },
  onecode: {
    showOneCodeRawTools: true,
    oneCodeThinkingPreview: true,
    rippleHideTechnical: true,
    rippleShowVisual: true,
    rippleDuplicateThinking: false,
    rippleThinkingSubtitle: false,
    rippleThinkingUmbrella: true,
    rippleFaithfulActivityLabels: false,
    rippleCombineChangeCheck: false,
    rippleShowActiveEdit: false,
    liveShimmer: true,
    expandedThinking: false,
    showFinalReply: true
  },
  ripple: {
    showOneCodeRawTools: false,
    oneCodeThinkingPreview: false,
    rippleHideTechnical: true,
    rippleShowVisual: true,
    rippleDuplicateThinking: false,
    rippleThinkingSubtitle: false,
    rippleThinkingUmbrella: true,
    rippleFaithfulActivityLabels: true,
    rippleCombineChangeCheck: true,
    rippleShowActiveEdit: false,
    liveShimmer: true,
    expandedThinking: false,
    showFinalReply: true
  },
  noisy: {
    showOneCodeRawTools: true,
    oneCodeThinkingPreview: true,
    rippleHideTechnical: false,
    rippleShowVisual: true,
    rippleDuplicateThinking: true,
    rippleThinkingSubtitle: true,
    rippleThinkingUmbrella: true,
    rippleFaithfulActivityLabels: false,
    rippleCombineChangeCheck: false,
    rippleShowActiveEdit: false,
    liveShimmer: true,
    expandedThinking: false,
    showFinalReply: true
  }
};

function escapeHtml(value) {
  return String(value)
    .replaceAll("&", "&amp;")
    .replaceAll("<", "&lt;")
    .replaceAll(">", "&gt;")
    .replaceAll('"', "&quot;");
}

function markdownish(value) {
  return escapeHtml(value)
    .replaceAll("`", "")
    .split(/\n{2,}/)
    .map((part) => `<p>${part.replaceAll("\n", "<br>")}</p>`)
    .join("");
}

function label(text, pending = false) {
  return pending && state.liveShimmer
    ? `<span class="shimmer">${escapeHtml(text)}</span>`
    : escapeHtml(text);
}

function row({ title, sub = "", pending = false, disclosure = false, open = false, menu = false, icon = "" }) {
  return `
    <div class="row${disclosure ? " disclosure" : ""}${open ? " open" : ""}">
      ${icon ? `<span class="row-icon ${escapeHtml(icon)}"></span>` : ""}
      <span class="label">${label(title, pending)}</span>
      ${sub ? `<span class="sub">${escapeHtml(sub)}</span>` : ""}
      ${disclosure ? `<span class="chev">›</span>` : ""}
      ${menu ? `<span class="menu-dots">•••</span>` : ""}
    </div>
  `;
}

function details(open) {
  return `
    <div class="details${open ? " open" : ""}">
      <div class="markdown">${markdownish(state.reasoningText)}</div>
    </div>
  `;
}

function thoughtPreview(max = 96) {
  const text = state.reasoningText
    .split("\n")
    .map((line) => line.trim())
    .find(Boolean) || "";
  return text.replace(/\*\*(.*?)\*\*/g, "$1").replace(/\s+/g, " ").slice(0, max);
}

function userBlock() {
  return `
    <div class="user">
      <div class="bubble">${escapeHtml(state.userText)}</div>
    </div>
  `;
}

function visualBlock() {
  if (!state.rippleShowVisual) return "";
  return `
    <div class="visual">
      <div class="visual-frame"><div class="phone"></div></div>
      <div class="visual-caption">Current frame</div>
    </div>
  `;
}

function oneCodeRuntimeTools() {
  if (!state.showOneCodeRawTools) {
    return row({ title: "Explored", sub: "4 files" });
  }

  return `
    ${row({
      title: "Explored",
      sub: "4 files",
      disclosure: true,
      open: state.expandedThinking
    })}
    ${state.expandedThinking ? `
      <div class="details open">
        <div class="markdown">
          <p>Read index.html</p>
          <p>Read styles.css</p>
          <p>Searched timeline setup</p>
          <p>Read motion helpers</p>
        </div>
      </div>
    ` : ""}
    <div class="row">
      <span class="label">index.html</span>
      <span class="sub"><span class="diff-stat add">+1</span> <span class="diff-stat remove">-1</span></span>
      <span class="menu-dots">•••</span>
    </div>
    <div class="tool-card">
      <div class="tool-head">Ran command: hyperframes <span class="menu-dots">•••</span></div>
      <pre>$ hyperframes lint .
No issues found</pre>
    </div>
  `;
}

function replyBlock() {
  if (!state.showFinalReply) return "";
  return `<div class="reply">${escapeHtml(state.replyText)}</div>`;
}

function technicalMenuRows() {
  if (state.rippleFaithfulActivityLabels && state.rippleCombineChangeCheck) {
    return "";
  }

  if (state.rippleFaithfulActivityLabels) {
    return row({
      title: "Ran command",
      sub: state.rippleHideTechnical
        ? "Check output hidden under the menu."
        : "hyperframes lint .",
      menu: true
    });
  }

  if (state.rippleHideTechnical) {
    return row({
      title: "Runtime options",
      sub: "Commands, diffs, and usage are hidden under the menu.",
      menu: true
    });
  }
  return `
    <div class="tool-card">
      <div class="tool-head">Command <span class="menu-dots">•••</span></div>
      <pre>ripple snapshot --current --json
hyperframes lint .</pre>
    </div>
    <div class="tool-card">
      <div class="tool-head">File edit</div>
      <pre>index.html
- left: 680px
+ left: 800px</pre>
    </div>
  `;
}

function rippleActivityRows() {
  if (state.rippleFaithfulActivityLabels) {
    const exploredRow = `
      ${row({
        title: "Explored 4 files",
        disclosure: true,
        open: state.expandedThinking,
        icon: "explore"
      })}
      ${state.expandedThinking ? `
        <div class="details open">
          <div class="markdown">
            <p>Read index.html</p>
            <p>Read styles.css</p>
            <p>Searched timeline setup</p>
            <p>Read motion helpers</p>
          </div>
        </div>
      ` : ""}
    `;

    if (state.rippleCombineChangeCheck) {
      if (state.rippleShowActiveEdit) {
        return `
          ${exploredRow}
          ${row({
            title: "Editing index.html",
            sub: "+1 -1",
            pending: true,
            icon: "pencil"
          })}
          ${row({
            title: thoughtPreview(96) || "Thinking",
            pending: true
          })}
        `;
      }

      return `
        ${exploredRow}
        ${row({
          title: "Edited 1 file",
          icon: "pencil"
        })}
        ${row({
          title: "Checked project",
          sub: "No issues found",
          icon: "check"
        })}
      `;
    }

    return `
      ${exploredRow}
      ${row({
        title: "Updated index.html",
        sub: state.rippleHideTechnical ? "Source details hidden under the menu." : "+1 -1",
        menu: true
      })}
    `;
  }

  return `
    ${row({ title: "Reviewed composition", sub: "Looked through project areas related to the edit.", menu: true })}
    ${row({ title: "Updated motion", sub: "Applied the source change without exposing code.", menu: true })}
  `;
}

function renderOneCode() {
  const pending = state.liveShimmer;
  const thoughtSub = state.oneCodeThinkingPreview
    ? state.reasoningText.replace(/\s+/g, " ").slice(0, 68)
    : "";
  const thinkingTitle = pending ? state.activeText : "Thought";

  return `
    ${userBlock()}
    <div class="assistant">
      ${row({
        title: thinkingTitle,
        sub: pending ? "" : thoughtSub,
        pending,
        disclosure: state.rippleThinkingUmbrella,
        open: state.expandedThinking
      })}
      ${details(state.expandedThinking)}
      ${visualBlock()}
      ${oneCodeRuntimeTools()}
      ${replyBlock()}
      <div class="usage">1,240 in · 312 out · 4.2s</div>
    </div>
  `;
}

function renderRipple() {
  const pending = state.liveShimmer;
  const thinkingSub = state.rippleThinkingSubtitle
    ? "Working through the next project step."
    : "";
  const thinkingTitle = thoughtPreview(96) || state.activeText;
  const thinkingRow = row({
    title: thinkingTitle,
    sub: thinkingSub,
    pending,
    disclosure: state.rippleThinkingUmbrella,
    open: state.expandedThinking
  });

  return `
    ${userBlock()}
    <div class="assistant">
      ${thinkingRow}
      ${state.rippleDuplicateThinking ? thinkingRow : ""}
      ${state.rippleThinkingUmbrella ? details(state.expandedThinking) : ""}
      ${row({ title: "Checked current frame", menu: true })}
      ${visualBlock()}
      ${rippleActivityRows()}
      ${technicalMenuRows()}
      ${state.rippleShowActiveEdit ? "" : replyBlock()}
    </div>
  `;
}

function renderControls() {
  const target = document.getElementById("controls");
  target.innerHTML = controlDefs.map(([key, title, desc]) => `
    <div class="control">
      <button class="toggle${state[key] ? " on" : ""}" data-toggle="${key}" aria-label="${escapeHtml(title)}"></button>
      <div class="control-text">
        <strong>${escapeHtml(title)}</strong>
        <span>${escapeHtml(desc)}</span>
      </div>
    </div>
  `).join("");
}

function renderPrompt() {
  const notes = [];
  notes.push("Use a compact, Cursor/1Code-like runtime feed for Ripple chat.");
  notes.push(state.liveShimmer
    ? "The active runtime item should be a single shimmering line."
    : "Do not animate the active runtime item.");
  notes.push(state.rippleThinkingUmbrella
    ? "Reasoning should be a quiet umbrella row: show the agent thought preview as the row label, then let the user open it for the full thought."
    : "Do not show a Thinking disclosure.");
  if (!state.rippleThinkingSubtitle) {
    notes.push("Do not show explanatory subtitles like 'Working through the next project step' on Thinking.");
  }
  if (state.rippleHideTechnical) {
    notes.push("Hide commands, file paths, diffs, and token usage behind runtime options.");
  }
  if (state.rippleShowVisual) {
    notes.push("Keep visual snapshots/frame sheets inline because they are useful to motion designers.");
  }
  if (state.rippleCombineChangeCheck) {
    notes.push("Combine file edits and checks into one completed activity umbrella.");
  }
  if (state.rippleShowActiveEdit) {
    notes.push("While an edit is active, show the filename and diff count; collapse it to a summary after it completes.");
  }
  if (state.rippleDuplicateThinking) {
    notes.push("Avoid the failure mode where a provider Thinking status and UI fallback produce two Thinking rows.");
  }
  document.getElementById("promptOutput").textContent = notes.join("\n");
}

function renderAll() {
  document.getElementById("compare").dataset.mode = state.view;
  document.querySelectorAll("[data-view]").forEach((button) => {
    button.classList.toggle("active", button.dataset.view === state.view);
  });
  document.getElementById("onecode-thread").innerHTML = renderOneCode();
  document.getElementById("ripple-thread").innerHTML = renderRipple();
  renderControls();
  renderPrompt();
}

function syncFields() {
  for (const id of ["userText", "activeText", "reasoningText", "replyText"]) {
    document.getElementById(id).value = state[id];
  }
}

function applyPreset(name) {
  Object.assign(state, presets[name] || presets.baseline);
  document.querySelectorAll(".preset").forEach((button) => {
    button.classList.toggle("active", button.dataset.preset === name);
  });
  renderAll();
}

document.addEventListener("click", (event) => {
  const viewButton = event.target.closest("[data-view]");
  if (viewButton) {
    state.view = viewButton.dataset.view;
    renderAll();
    return;
  }

  const preset = event.target.closest("[data-preset]");
  if (preset) {
    applyPreset(preset.dataset.preset);
    return;
  }

  const toggle = event.target.closest("[data-toggle]");
  if (toggle) {
    const key = toggle.dataset.toggle;
    state[key] = !state[key];
    document.querySelectorAll(".preset").forEach((button) => button.classList.remove("active"));
    renderAll();
    return;
  }

  const disclosure = event.target.closest(".row.disclosure");
  if (disclosure) {
    state.expandedThinking = !state.expandedThinking;
    renderAll();
  }
});

for (const id of ["userText", "activeText", "reasoningText", "replyText"]) {
  document.getElementById(id).addEventListener("input", (event) => {
    state[id] = event.target.value;
    renderAll();
  });
}

document.getElementById("copyPrompt").addEventListener("click", async () => {
  const text = document.getElementById("promptOutput").textContent;
  await navigator.clipboard.writeText(text);
  const button = document.getElementById("copyPrompt");
  button.textContent = "Copied!";
  setTimeout(() => { button.textContent = "Copy direction"; }, 900);
});

syncFields();
renderAll();
</script>
</body>
</html>
